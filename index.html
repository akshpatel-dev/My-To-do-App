<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>To-do App</title>
</head>
<body>
    <h1>Todo App</h1>
    <div class="wrapper">
        <form>
            <input type="text" class="todo-inputs" placeholder="write anything and hit enter to add" autocomplete="off">
            <button class="add-btn">
                ADD
            </button>
        </form>
        <ui class="todo-list">
        </ui>
    </div>
</body>
</html>
